<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Golf Tracker</title>

<style>
:root{
--bg:#0f1115;
--card:#181c22;
--card2:#20252d;
--text:#f5f7fa;
--muted:#9aa4b2;
--border:#2a313c;
--green:#43a047;
--green2:#81c784;
--red:#d9534f;
--blue:#4da3ff;
--shadow:0 12px 28px rgba(0,0,0,.35);
--radius:18px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Inter,Arial,sans-serif;
background:linear-gradient(180deg,#0b0d11,#161b22);
color:var(--text);
padding:18px;
}

.app{
max-width:1200px;
margin:auto;
}

.hero-header{
background:linear-gradient(135deg,#1b5e20,#43a047,#81c784);
border-radius:28px;
padding:32px 24px;
margin-bottom:22px;
position:relative;
overflow:hidden;
box-shadow:var(--shadow);
}

.hero-header:before{
content:'⛳';
position:absolute;
right:20px;
top:-6px;
font-size:90px;
opacity:.15;
}

.hero-title{
font-size:38px;
font-weight:900;
letter-spacing:3px;
}

.hero-sub{
margin-top:8px;
opacity:.92;
}

.nav{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.nav button{
flex:1;
min-width:120px;
padding:14px;
border-radius:14px;
border:1px solid var(--border);
background:var(--card);
color:var(--muted);
cursor:pointer;
font-weight:700;
transition:.2s;
}

.nav button:hover{
transform:translateY(-2px);
}

.nav button.active{
background:var(--green);
color:white;
border-color:transparent;
}

.card{
background:rgba(24,28,34,.95);
border:1px solid var(--border);
border-radius:var(--radius);
padding:18px;
margin-bottom:16px;
box-shadow:var(--shadow);
backdrop-filter:blur(10px);
}

.course-name{
font-size:20px;
font-weight:800;
}

.sub{
color:var(--muted);
font-size:14px;
margin-top:4px;
}

.row-sb{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.stats-row{
display:flex;
gap:16px;
flex-wrap:wrap;
margin-top:14px;
}

.stat{
font-size:13px;
color:var(--muted);
}

.stat span{
color:white;
font-weight:700;
}

.score-chip{
padding:8px 14px;
border-radius:999px;
font-weight:800;
}

.s-under{
background:#1d4d2f;
color:#9cffbb;
}

.s-over{
background:#5b1f1f;
color:#ffb2b2;
}

.s-even{
background:#163654;
color:#9fd0ff;
}

.add-btn{
width:100%;
padding:16px;
border-radius:18px;
border:2px dashed #3a4654;
background:#161b22;
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.add-btn:hover{
background:#1d232c;
}

.modal-wrap{
position:fixed;
inset:0;
background:rgba(0,0,0,.72);
display:flex;
justify-content:center;
align-items:flex-start;
overflow:auto;
padding:30px 16px;
z-index:999;
}

.modal{
width:100%;
max-width:760px;
background:#181c22;
border-radius:24px;
padding:24px;
border:1px solid var(--border);
box-shadow:var(--shadow);
}

.modal h3{
font-size:24px;
margin-bottom:20px;
}

.form-row{
margin-bottom:16px;
}

.form-label{
display:block;
margin-bottom:6px;
font-size:13px;
color:var(--muted);
}

input,select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid var(--border);
background:#101419;
color:white;
font-size:15px;
}

input:focus,select:focus{
outline:none;
border-color:var(--green);
box-shadow:0 0 0 4px rgba(67,160,71,.2);
}

.form-2col{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.modal-actions{
display:flex;
gap:12px;
margin-top:20px;
}

.modal-actions button{
flex:1;
padding:14px;
border-radius:14px;
font-weight:800;
cursor:pointer;
border:none;
}

.btn-cancel{
background:#252b35;
color:white;
}

.btn-save{
background:var(--green);
color:white;
}

.search-bar{
margin-bottom:16px;
}

.empty-state{
padding:40px;
text-align:center;
color:var(--muted);
}

.chip{
padding:5px 10px;
border-radius:999px;
font-size:12px;
font-weight:800;
text-transform:uppercase;
}

.chip-white{background:#f1f1f1;color:#111;}
.chip-yellow{background:#f7df6a;color:#222;}
.chip-blue{background:#4da3ff;color:white;}
.chip-red{background:#e64d4d;color:white;}
.chip-black{background:#000;color:white;}

@media(max-width:768px){

body{
padding:10px;
}

.hero-title{
font-size:28px;
}

.form-2col{
grid-template-columns:1fr;
}

.row-sb{
flex-direction:column;
}

.stats-row{
gap:10px;
}

.nav{
flex-direction:column;
}

.nav button{
width:100%;
}

.modal{
padding:18px;
border-radius:20px;
}

.card{
padding:16px;
}

}

</style>
</head>

<body>

<div class="app">

<div class="hero-header">
<div class="hero-title">GOLF TRACKER</div>
<div class="hero-sub">Dark mode • mobile optimized • polished UI</div>
</div>

<div class="nav">
<button class="active">Rounds</button>
<button>Courses</button>
<button>Trends</button>
<button>Handicap</button>
</div>

<div class="card">
<div class="row-sb">
<div>
<div class="course-name">Kasumigaseki CC</div>
<div class="sub">Apr 20, 2026 • Blue Tees</div>
</div>
<div class="score-chip s-over">81 (+9)</div>
</div>

<div class="stats-row">
<div class="stat">FIR <span>9/14</span></div>
<div class="stat">GIR <span>11/18</span></div>
<div class="stat">Putts <span>32</span></div>
<div class="stat">Diff <span>6.4</span></div>
</div>
</div>

<div class="card">
<div class="row-sb">
<div>
<div class="course-name">Hirono GC</div>
<div class="sub">Mar 15, 2026 • White Tees</div>
</div>
<div class="score-chip s-even">72 (E)</div>
</div>

<div class="stats-row">
<div class="stat">FIR <span>11/14</span></div>
<div class="stat">GIR <span>13/18</span></div>
<div class="stat">Putts <span>29</span></div>
<div class="stat">Diff <span>0.0</span></div>
</div>
</div>

<button class="add-btn">+ Log New Round</button>

</div>

</body>
</html>
loadData();
renderRounds();
</script>
</body>
</html>
