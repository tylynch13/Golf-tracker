<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    .app{padding:1rem 0;max-width:680px;margin:0 auto}
    .nav{display:flex;gap:6px;margin-bottom:1.5rem}
    .nav button{flex:1;padding:9px 4px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;cursor:pointer;transition:all .15s}
    .nav button.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-primary)}
    .view{display:none}.view.active{display:block}
    .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
    .card-hover{cursor:pointer;transition:border-color .15s}.card-hover:hover{border-color:var(--color-border-primary)}
    .row-sb{display:flex;justify-content:space-between;align-items:flex-start}
    .course-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
    .sub{font-size:12px;color:var(--color-text-secondary)}
    .chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:500}
    .chip-white{background:#F1EFE8;color:#444441}.chip-yellow{background:#FAEEDA;color:#633806}.chip-blue{background:#E6F1FB;color:#0C447C}.chip-red{background:#FCEBEB;color:#791F1F}.chip-black{background:#2C2C2A;color:#D3D1C7}
    .score-chip{padding:4px 10px;border-radius:6px;font-size:13px;font-weight:500}
    .s-under{background:#EAF3DE;color:#3B6D11}.s-over{background:#FCEBEB;color:#A32D2D}.s-even{background:#E6F1FB;color:#185FA5}
    .stats-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
    .stat{font-size:13px;color:var(--color-text-secondary)}.stat span{font-weight:500;color:var(--color-text-primary)}
    .add-btn{width:100%;padding:12px;border:0.5px dashed var(--color-border-secondary);border-radius:12px;background:transparent;color:var(--color-text-secondary);font-size:14px;cursor:pointer;margin-top:4px}
    .add-btn:hover{background:var(--color-background-secondary)}
    .round-actions{margin-top:10px;display:flex;gap:8px}
    .btn-small{padding:6px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:transparent;cursor:pointer}
    .btn-edit{color:#185FA5}.btn-delete{color:#A32D2D}
    .btn-small:hover{background:var(--color-background-secondary)}
    .modal-wrap{min-height:480px;background:rgba(0,0,0,0.42);display:flex;align-items:flex-start;justify-content:center;padding:16px 0}
    .modal{background:var(--color-background-primary);border-radius:12px;padding:1.5rem;width:96%;max-width:500px;border:0.5px solid var(--color-border-secondary)}
  </style>
</head>
<body>

<div class="app">
  <div class="nav">
    <button class="active" onclick="showView('rounds')">Rounds</button>
    <button onclick="showView('courses')">Courses</button>
    <button onclick="showView('trends')">Trends</button>
    <button onclick="showView('handicap')">Handicap</button>
  </div>

  <div id="view-rounds" class="view active">
    <div id="rounds-list"></div>
    <button class="add-btn" onclick="openRoundModal()">+ Log new round</button>
  </div>

  <!-- Other views (you can add them later if needed) -->
</div>

<!-- Round Modal -->
<div id="round-modal" style="display:none">
  <div class="modal-wrap">
    <div class="modal">
      <h3 id="modal-title">Log a round</h3>
      <p style="color:#666;margin-bottom:1rem">Full modal form would go here. For now Edit/Delete/LocalStorage works on the list.</p>
      <div class="modal-actions" style="margin-top:20px">
        <button onclick="closeModals()" style="padding:10px">Cancel</button>
        <button onclick="saveRound()" style="padding:10px;background:#185FA5;color:white">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ====================== DATA ======================
let courses = [];
let rounds = [];
let nextRoundId = 1;
let editingRoundId = null;

const TEE_CHIP = {white:'chip chip-white',yellow:'chip chip-yellow',blue:'chip chip-blue',red:'chip chip-red',black:'chip chip-black'};

// Load from localStorage
function loadData() {
  const savedRounds = localStorage.getItem('golfRounds');
  if (savedRounds) rounds = JSON.parse(savedRounds);
  if (rounds.length) nextRoundId = Math.max(...rounds.map(r => r.id)) + 1;
}

// Save to localStorage
function saveData() {
  localStorage.setItem('golfRounds', JSON.stringify(rounds));
}

// Helper functions
function totalScore(r){return r.holes ? r.holes.reduce((a,h)=>a+h.score,0) : 0;}
function totalPar(r){return r.holes ? r.holes.reduce((a,h)=>a+h.par,0) : 0;}
function formatDate(d){return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}

function chipHtml(tee){
  return `<span class="chip ${TEE_CHIP[tee]||''}">${tee}</span>`;
}

// Render Rounds
function renderRounds(){
  const list = document.getElementById('rounds-list');
  list.innerHTML = '';
  if(!rounds.length){
    list.innerHTML = '<div style="text-align:center;padding:2rem;color:#666">No rounds yet.<br>Click "+ Log new round"</div>';
    return;
  }

  [...rounds].sort((a,b)=>b.date.localeCompare(a.date)).forEach(r => {
    const tot = totalScore(r);
    const par = totalPar(r);
    const dn = tot - par;
    const bc = dn<0 ? 's-under' : dn>0 ? 's-over' : 's-even';
    const bt = dn===0 ? 'E' : (dn>0 ? '+'+dn : ''+dn);

    list.innerHTML += `
      <div class="card">
        <div onclick="showDetail(${r.id})" style="cursor:pointer">
          <div class="row-sb">
            <div>
              <div class="course-name">${r.course || 'Unknown'} ${chipHtml(r.tee)}</div>
              <div class="sub">${formatDate(r.date)}</div>
            </div>
            <span class="score-chip ${bc}">${tot} (${bt})</span>
          </div>
        </div>
        <div class="round-actions">
          <button class="btn-small btn-edit" onclick="editRound(${r.id});event.stopImmediatePropagation()">✏️ Edit</button>
          <button class="btn-small btn-delete" onclick="deleteRound(${r.id});event.stopImmediatePropagation()">🗑️ Delete</button>
        </div>
      </div>`;
  });
}

function deleteRound(id){
  if(confirm("Delete this round permanently?")){
    rounds = rounds.filter(r => r.id !== id);
    saveData();
    renderRounds();
  }
}

function editRound(id){
  const round = rounds.find(r => r.id === id);
  if(!round) return;
  editingRoundId = id;
  document.getElementById('modal-title').textContent = 'Edit Round';
  document.getElementById('round-modal').style.display = 'block';
  // TODO: pre-fill form (advanced)
}

function saveRound(){
  // Simple placeholder for now
  if(editingRoundId){
    alert("Edit saved (full form coming soon)");
    editingRoundId = null;
  } else {
    alert("New round saved (full form coming soon)");
  }
  closeModals();
  renderRounds();
}

function closeModals(){
  document.getElementById('round-modal').style.display = 'none';
  editingRoundId = null;
  document.getElementById('modal-title').textContent = 'Log a round';
}

function showDetail(id){
  alert("Detail view for round " + id + " (you can expand this later)");
}

// Initialize
loadData();
renderRounds();
</script>
</body>
</html>
