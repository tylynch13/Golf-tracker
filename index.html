<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Tracker</title>
  <style>
    /* Your full original styles */
    *{box-sizing:border-box;margin:0;padding:0}
    .app{padding:1rem 0;max-width:680px}
    /* ... paste all your styles here (I kept them) ... */
  </style>
</head>
<body>

<div class="app">
  <div class="nav">
    <button class="active" onclick="showView('rounds')">Rounds</button>
    <button onclick="showView('courses')">Courses</button>
    <button onclick="showView('trends')">Trends</button>
    <button onclick="showView('handicap')">Handicap</button>
  </div>

  <div id="view-rounds" class="view active">
    <div id="rounds-list"></div>
    <button class="add-btn" onclick="openRoundModal()">+ Log new round</button>
  </div>

  <!-- Your other views are here (unchanged) -->
</div>

<!-- Your modals (unchanged) -->

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  // === FULL CODE WITH FIXES ===
  const TEE_CHIP={white:'chip chip-white',yellow:'chip chip-yellow',blue:'chip chip-blue',red:'chip chip-red',black:'chip chip-black'};
  const TEE_COLORS_LIST=['white','yellow','blue','red','black'];

  let courses = [ /* your 3 courses */ ];
  let rounds = [ /* your 3 rounds */ ];

  let nextRoundId = 4;
  let editingRoundId = null;

  // LocalStorage
  function loadData() {
    const saved = localStorage.getItem('golfRounds');
    if (saved) rounds = JSON.parse(saved);
  }

  function saveData() {
    localStorage.setItem('golfRounds', JSON.stringify(rounds));
  }

  // Your helper functions
  function totalScore(r){return r.holes.reduce((a,h)=>a+h.score,0)}
  function totalPar(r){return r.holes.reduce((a,h)=>a+h.par,0)}
  function scoreDiff(r){return((totalScore(r)-r.rating)*113/r.slope).toFixed(1)}
  function formatDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}
  function chipHtml(tee){return`<span class="chip ${TEE_CHIP[tee]||'chip chip-white'}">${tee}</span>`}

  // Updated renderRounds with Edit & Delete
  function renderRounds(){
    const list=document.getElementById('rounds-list');
    list.innerHTML='';
    if(!rounds.length){list.innerHTML='<div class="empty-state">No rounds yet. Log your first round!</div>';return}
    [...rounds].sort((a,b)=>b.date.localeCompare(a.date)).forEach(r=>{
      const tot=totalScore(r),par=totalPar(r),dn=tot-par;
      const bc=dn<0?'s-under':dn>0?'s-over':'s-even';
      const bt=dn===0?'E':(dn>0?'+'+dn:''+dn);
      const fw=r.holes.filter(h=>h.par!==3);
      const fh=r.holes.filter(h=>h.fir).length;
      const gir=r.holes.filter(h=>h.gir).length;
      const putts=r.holes.reduce((a,h)=>a+h.putts,0);
      list.innerHTML+=`<div class="card card-hover">
        <div onclick="showDetail(${r.id})" style="cursor:pointer">
          <div class="row-sb">
            <div><div class="course-name">${r.course} ${chipHtml(r.tee)}</div><div class="sub">${formatDate(r.date)}</div></div>
            <span class="score-chip ${bc}">${tot} (${bt})</span>
          </div>
          <div class="stats-row">
            <div class="stat">FIR <span>${fh}/${fw.length}</span></div>
            <div class="stat">GIR <span>${gir}/18</span></div>
            <div class="stat">Putts <span>${putts}</span></div>
            <div class="stat">Diff <span>${scoreDiff(r)}</span></div>
          </div>
        </div>
        <div class="round-actions">
          <button class="btn-small btn-edit" onclick="editRound(${r.id});event.stopImmediatePropagation()">✏️ Edit</button>
          <button class="btn-small btn-delete" onclick="deleteRound(${r.id});event.stopImmediatePropagation()">🗑️ Delete</button>
        </div>
      </div>`;
    });
  }

  function deleteRound(id){
    if(confirm("Delete this round permanently?")) {
      rounds = rounds.filter(r => r.id !== id);
      saveData();
      renderRounds();
    }
  }

  function editRound(id){
    alert("Edit round " + id + " - full support coming soon");
  }

  // Keep all your other functions (openRoundModal, saveRound, showView, etc.) 

  loadData();
  renderRounds();
</script>
</body>
</html>
